name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: "1.7.0"
  APP_NAME: chroma-sync

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: Infra
    permissions:
      id-token: write  # OIDC認証用
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account info
        id: aws-info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "tf_state_bucket=${{ env.APP_NAME }}-tfstate-${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      # ──── Terraform でECRリポジトリを先に作成（Docker push より先に必要） ────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.aws-info.outputs.tf_state_bucket }}" \
            -backend-config="key=${{ env.APP_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Import existing ECR repos into Terraform state
        working-directory: infra
        run: |
          terraform state show aws_ecr_repository.api 2>/dev/null || \
            terraform import aws_ecr_repository.api ${{ env.APP_NAME }}-api || true
          terraform state show aws_ecr_repository.worker 2>/dev/null || \
            terraform import aws_ecr_repository.worker ${{ env.APP_NAME }}-worker || true

      - name: Terraform Apply (ECR only)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.api \
            -target=aws_ecr_repository.worker

      # ──── バックエンドDockerイメージのビルド & プッシュ ────

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f backend/Dockerfile.lambda \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest \
            backend/
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest
          echo "API_IMAGE_URI=$ECR_REGISTRY/${{ env.APP_NAME }}-api:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build and push Worker Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f backend/Dockerfile.lambda \
            --build-arg LAMBDA_CMD="worker_handler.handler" \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-worker:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-worker:latest \
            backend/
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-worker:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-worker:latest
          echo "WORKER_IMAGE_URI=$ECR_REGISTRY/${{ env.APP_NAME }}-worker:$IMAGE_TAG" >> $GITHUB_ENV

      # ──── Terraform で残りのインフラを更新 ────

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="api_lambda_image_uri=${{ env.API_IMAGE_URI }}" \
            -var="worker_lambda_image_uri=${{ env.WORKER_IMAGE_URI }}"

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "FRONTEND_BUCKET=$(terraform output -raw frontend_bucket)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DOMAIN=$(terraform output -raw cloudfront_domain)" >> $GITHUB_ENV
          echo "API_GATEWAY_URL=$(terraform output -raw api_gateway_url)" >> $GITHUB_ENV

      # ──── フロントエンドのビルド & S3アップロード ────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ""  # CloudFront経由のため空（相対パス）

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://${{ env.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## デプロイ完了 🎉" >> $GITHUB_STEP_SUMMARY
          echo "- フロントエンドURL: ${{ env.CLOUDFRONT_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- APIエンドポイント: ${{ env.API_GATEWAY_URL }}" >> $GITHUB_STEP_SUMMARY
